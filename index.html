<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="甜薄荷">
    <meta name="theme-color" content="#7BAF9E">
    <link rel="manifest" href="manifest.json">
    <title>甜薄荷</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="app">
        <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
        <aside class="sidebar hidden" id="sidebar">
            <div class="sidebar-header">
                <div class="user-info" id="userInfoClickable" style="cursor:pointer;">
                    <div class="avatar user-avatar" id="userAvatarDisplay">
                        <i data-lucide="moon" class="avatar-icon"></i>
                    </div>
                    <input type="file" id="userAvatarInput" accept="image/*" hidden>
                    <div class="user-meta">
                        <span class="username" id="usernameDisplay">郑郑</span>
                        <span class="user-status">点击编辑</span>
                    </div>
                </div>
                <button class="btn-icon" id="closeSidebar"><i data-lucide="x"></i></button>
            </div>
            <button class="btn-new-chat" id="newChatBtn">
                <i data-lucide="plus"></i>
                <span>新建对话</span>
            </button>
            <div class="chat-list" id="chatList"></div>
            <div class="sidebar-footer">
                <button class="nav-icon-btn" id="openStats"><i data-lucide="bar-chart-3"></i><span>统计</span></button>
                <button class="nav-icon-btn nav-icon-btn-home" id="sidebarBackToHome"><i data-lucide="home"></i><span>小家</span></button>
                <button class="nav-icon-btn" id="editAiAssistant"><i data-lucide="bot"></i><span>助手</span></button>
            </div>
        </aside>

        <!-- ===== 小家首页 ===== -->
        <div class="home-page active" id="homePage">
            <div class="home-header">
                <div class="home-header-left">
                    <button class="btn-icon" id="homeOpenSettings"><i data-lucide="settings"></i></button>
                </div>
                <h1 class="home-title">我们的小家</h1>
                <div class="home-header-right"></div>
            </div>
            <div class="home-content">
                <div class="love-record-card" id="homeGreeting">
                    <div class="love-record-eyebrow">🌿 小小恋爱记录</div>
                    <div class="love-record-names"><span id="loveNameUser">郑郑</span><span class="love-record-amp">&amp;</span><span id="loveNameAi">晏晏</span></div>
                    <div class="love-record-days" id="greetingDays">0</div>
                    <div class="love-record-days-label">已经在一起的日子</div>
                    <div class="love-record-avatars">
                        <div class="love-record-avatar" id="loveAvatarUser">🌙</div>
                        <i data-lucide="heart" class="love-record-heart"></i>
                        <div class="love-record-avatar" id="loveAvatarAi">✦</div>
                    </div>
                    <div class="love-record-since">since 2026.06.21</div>
                </div>
                <div class="message-card">
                    <div class="message-card-title"><i data-lucide="heart-handshake"></i> ta的留言</div>
                    <div class="message-card-text" id="taMessageText">今天也要元气满满地开始呀～</div>
                </div>
                <button class="chat-entry-bar" id="chatEntryBar">
                    <span>💬 和晏晏聊天...</span>
                </button>
                <div class="room-grid">
                    <div class="room-card" data-room="living">
                        <div class="room-icon">🛋️</div>
                        <div class="room-info">
                            <span class="room-name">客厅</span>
                            <span class="room-desc">敬请期待</span>
                        </div>
                    </div>
                    <div class="room-card" data-room="diary">
                        <div class="room-icon">🛏️</div>
                        <div class="room-info">
                            <span class="room-name">卧室</span>
                            <span class="room-desc">写日记</span>
                        </div>
                    </div>
                    <div class="room-card" data-room="study">
                        <div class="room-icon">📚</div>
                        <div class="room-info">
                            <span class="room-name">书房</span>
                            <span class="room-desc">敬请期待</span>
                        </div>
                    </div>
                    <div class="room-card" data-room="kitchen">
                        <div class="room-icon">🍳</div>
                        <div class="room-info">
                            <span class="room-name">厨房</span>
                            <span class="room-desc">敬请期待</span>
                        </div>
                    </div>
                    <div class="room-card" data-room="balcony">
                        <div class="room-icon">🌙</div>
                        <div class="room-info">
                            <span class="room-name">阳台</span>
                            <span class="room-desc">敬请期待</span>
                        </div>
                    </div>
                    <div class="room-card" data-room="garden">
                        <div class="room-icon">🌷</div>
                        <div class="room-info">
                            <span class="room-name">花园</span>
                            <span class="room-desc">敬请期待</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <main class="chat-main" id="chatMain" style="display:none;">
            <div class="lace-top-decoration"></div>
            <header class="chat-header">
                <button class="btn-icon" id="openSidebar" title="侧边栏"><i data-lucide="chevron-left"></i></button>
                <div class="chat-title">
                    <span id="currentChatTitle">新对话</span>
                    <span class="model-badge" id="modelBadge">未配置模型</span>
                </div>
                <button class="btn-icon" id="headerNewChat" title="新建对话"><i data-lucide="message-circle-plus"></i></button>
            </header>

            <div class="messages" id="messages"></div>

            <div class="input-area">
                <div class="input-popup plus-menu" id="plusMenu">
                    <div class="plus-menu-row model-switch-row" id="modelSwitchRow">
                        <span class="plus-menu-label"><i data-lucide="cpu"></i> 模型</span>
                        <span class="plus-menu-value" id="plusMenuModel">未配置<i data-lucide="chevron-right"></i></span>
                    </div>
                    <div class="model-quick-list" id="modelQuickList" style="display:none;"></div>
                    <div class="plus-menu-row">
                        <span class="plus-menu-label"><i data-lucide="globe"></i> 联网搜索</span>
                        <label class="switch"><input type="checkbox" id="toggleWebSearch"><span class="switch-slider"></span></label>
                    </div>
                    <div class="plus-menu-row">
                        <span class="plus-menu-label"><i data-lucide="blocks"></i> MCP</span>
                        <label class="switch"><input type="checkbox" id="toggleMcp"><span class="switch-slider"></span></label>
                    </div>
                    <div class="plus-menu-row" id="compressRow" style="cursor:pointer;">
                        <span class="plus-menu-label"><i data-lucide="archive"></i> 压缩对话历史</span>
                        <i data-lucide="chevron-right" class="emoji-chevron"></i>
                    </div>
                    <div class="plus-menu-row emoji-row" id="emojiRow">
                        <span class="plus-menu-label"><i data-lucide="smile"></i> 表情</span>
                        <i data-lucide="chevron-down" class="emoji-chevron"></i>
                    </div>
                    <div class="sticker-panel" id="stickerPanel"></div>
                </div>

                <div class="input-card">
                    <div class="input-card-top">
                        <textarea id="messageInput" placeholder="和ta说点什么..." rows="1"></textarea>
                        <button class="btn-input-icon" id="expandInput" title="全屏输入"><i data-lucide="maximize-2"></i></button>
                    </div>
                    <div class="input-card-toolbar">
                        <div class="input-card-toolbar-left">
                            <button class="toolbar-btn" id="plusBtn" title="更多"><i data-lucide="sparkles"></i></button>
                            <button class="toolbar-btn" id="uploadBtn" title="上传"><i data-lucide="plus"></i></button>
                            <button class="toolbar-btn" id="voiceBtn" title="语音输入"><i data-lucide="mic"></i></button>
                        </div>
                        <button class="btn-send" id="sendBtn" disabled><i data-lucide="corner-right-up"></i></button>
                    </div>
                </div>

                <div class="input-popup upload-menu" id="uploadMenu">
                    <div class="plus-menu-row upload-row" id="uploadFile">
                        <span class="plus-menu-label"><i data-lucide="file"></i> 上传文件</span>
                    </div>
                    <div class="plus-menu-row upload-row" id="uploadCamera">
                        <span class="plus-menu-label"><i data-lucide="camera"></i> 拍照</span>
                    </div>
                    <div class="plus-menu-row upload-row" id="uploadImage">
                        <span class="plus-menu-label"><i data-lucide="image"></i> 选择图片</span>
                    </div>
                    <input type="file" id="fileInputHidden" hidden>
                    <input type="file" id="cameraInputHidden" accept="image/*" capture="environment" hidden>
                    <input type="file" id="imageInputHidden" accept="image/*" hidden>
                </div>
            </div>

            <div class="fullscreen-input-overlay" id="fullscreenInput">
                <div class="fullscreen-input-header">
                    <h3>编辑消息</h3>
                    <button class="btn-icon" id="closeFullscreen"><i data-lucide="x"></i></button>
                </div>
                <textarea class="fullscreen-textarea" id="fullscreenTextarea" placeholder="在这里输入更多内容..."></textarea>
                <div class="fullscreen-input-footer">
                    <button class="btn-primary" id="fullscreenSend">发送</button>
                </div>
            </div>
        </main>

        <div class="settings-overlay" id="settingsOverlay">
            <div class="settings-panel">
                <div class="settings-header">
                    <div class="settings-header-left">
                        <button class="btn-icon settings-back-btn" id="settingsBackBtn" style="display:none;"><i data-lucide="arrow-left"></i></button>
                        <h2 id="settingsTitle">设置</h2>
                    </div>
                    <button class="btn-icon" id="closeSettings"><i data-lucide="x"></i></button>
                </div>
                <div class="settings-content" id="settingsContent"></div>
                <div class="settings-footer" id="settingsFooter"></div>
            </div>
        </div>

        <div class="edit-title-overlay" id="editTitleOverlay">
            <div class="edit-title-panel">
                <h3>编辑对话标题</h3>
                <input type="text" id="editTitleInput" placeholder="输入对话标题">
                <div class="edit-title-actions">
                    <button class="btn-cancel" id="editTitleCancel">取消</button>
                    <button class="btn-primary" id="editTitleSave">保存</button>
                </div>
            </div>
        </div>

        <div class="edit-user-overlay" id="editUserOverlay">
            <div class="edit-user-panel">
                <div class="edit-user-header">
                    <h3>编辑个人信息</h3>
                    <button class="btn-icon" id="closeEditUser"><i data-lucide="x"></i></button>
                </div>
                <div class="edit-user-content">
                    <div class="form-group" style="text-align:center;">
                        <div class="edit-user-avatar" id="editUserAvatar"><i data-lucide="moon"></i></div>
                        <div><button class="btn-secondary" id="changeUserAvatarBtn" style="margin-top:10px;font-size:12px;">更换头像</button></div>
                    </div>
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="editUserNameInput" placeholder="输入用户名">
                    </div>
                </div>
                <div class="edit-user-footer">
                    <button class="btn-primary" id="saveEditUser">保存</button>
                </div>
            </div>
        </div>

        <div class="stats-overlay" id="statsOverlay">
            <div class="stats-panel">
                <div class="stats-header">
                    <button class="stats-back" id="closeStats"><i data-lucide="chevron-left"></i></button>
                    <h2>统计</h2>
                </div>
                <div class="stats-content" id="statsContent"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW register failed:', err));
            });
        }
    </script>
</body>
</html>
